name: "Default Workflow"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize]
  push:
    branches:
      - main

jobs:
  default-workflow:
    uses: phorus-group/workflows/.github/workflows/node.yarn.yml@main
    with:
      disable-integration-test: true
      slack-failure-channel: "C0AMP6VM0EB"
    secrets:
      slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  ci-assistant:
    needs: [default-workflow]
    if: ${{ failure() }}
    uses: phorus-group/workflows/.github/workflows/ci-assistant.yml@main
    with:
      node-version: "22"
      slack-failure-channel: "C0AMP6VM0EB"
      slack-thread-ts: ${{ needs.default-workflow.outputs.slack-failure-thread-ts }}
      admin-users: ${{ vars.CI_ASSISTANT_ADMIN_USERS }}
      banned-users: ${{ vars.CI_ASSISTANT_BANNED_USERS }}
      github-app-id: "3210197"
    secrets:
      claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
      github-app-private-key: ${{ secrets.CI_ASSISTANT_PRIVATE_KEY }}
